# Frozen, DETERMINISTIC dosbox-x config for the int8 capture.
# Reference/template — tools/dosbox/capture.py generates a run-specific copy with
# the absolute mount path + the cycles/frame-count for the run.  Determinism is the
# whole point: same config + same input script + same emulator build => same trace.
#
# Headless: launch with SDL_VIDEODRIVER=dummy SDL_AUDIODRIVER=dummy (env, not config),
# so the emulation core runs without a window or audio device.

[cpu]
# core=normal is the plain interpreter — REQUIRED for determinism (the dynamic
# recompiler can perturb timing). cputype fixed; cycles FIXED (never auto/max) so the
# int8/PIT cadence is identical every run.
core    = normal
cputype = 386
cycles  = fixed 6000

[dosbox]
machine = vgaonly      # Bumpy uses graphics-overlay mode 0x0D (320x200x16 EGA/VGA planar)

[mixer]
nosound = true         # headless: no audio device. Sound state is excluded from the
                       # SNAP anyway (the async int8/L5 ISR carve-out), so this does
                       # not affect the captured gameplay state.

[autoexec]
# capture.py rewrites the mount path; the game install is local/build/capture/game/
# (BUMPY.EXE + the .BNK/.VEC/.BUM/.DEC/.PAV data + CODES.EXE).
mount c /ABSOLUTE/PATH/TO/local/build/capture/game
c:
BUMPY.EXE
exit
